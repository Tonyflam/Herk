# ============================================================================
# HELM — strategy & risk configuration
# Safe defaults: PAPER mode, survival-first risk. Tune freely.
# ============================================================================

mode: paper                     # paper | live  (env can override via HELM_MODE)

# Active risk profile. Survival-first `balanced` is the safe default (paper, CI,
# demos). The live CONTEST runs `aggressive` — calibrated to the prize's actual
# objective: PURE total return, DQ only at 30% drawdown. Flip via HELM_PROFILE.
#   balanced   — capital-preservation posture (the field's default; cedes the race)
#   aggressive — deploy hard into concentrated momentum; 30% DQ is the binding cap
#   max        — endgame catch-up posture; hottest, ~2% DQ margin (use deliberately)
profile: balanced

capital:
  base_currency: USDT           # cash leg; BNB held only for gas (BNB not in eligible list)
  initial_paper_equity_usd: 93.17  # real post-conversion USDT start (0.159 BNB->93.17 USDT, tx 0x7e6bd6a6). Live return%/drawdown baseline = this; BNB gas reserve is out-of-scope and excluded.

# ---------------------------------------------------------------------------
# CONTEST — the live tournament window and its scoring constraints.
# HELM optimizes for PLACEMENT under a bust-out constraint (poker-ICM logic),
# not raw chart PnL. This block feeds the Contest Meta-Controller (the edge).
# ---------------------------------------------------------------------------
contest:
  enabled: true
  start_utc: "2026-06-22T12:00:00Z"
  end_utc:   "2026-06-28T12:00:00Z"
  max_drawdown_pct: 30.0        # official DQ gate — breaching = disqualified
  halt_drawdown_pct: 22.0       # HELM's OWN halt, set BELOW the gate (safety margin)
  min_trades_per_day: 1         # DQ if a UTC day has zero trades
  dust_floor_usd: 1.0           # any hour starting <= this is scored 0% — never get drained to dust
  # Daily-floor guarantee: force the >=1-trade/day ping from this UTC hour (NOT
  # 23:59) so a transient failure still leaves hourly retry buffer before midnight.
  min_trade_deadline_hour: 18
  min_trade_retry_attempts: 3
  # Meta-controller posture switches
  build_phase_frac: 0.35        # first 35% of window = build a base carefully
  endgame_phase_frac: 0.80      # last 20% of window = lock posture by rank
  protect_lead_return_pct: 20.0 # cumulative return >= this -> PROTECT (minimize variance, just meet min-trade)
  catchup_behind_return_pct: 2.0  # if late & under this return -> allow BOUNDED extra variance (never breach halt)
  # Codified endgame escalation (pre-committed; the ENGINE decides, not a human
  # flipping HELM_PROFILE mid-contest). When behind late with survival budget
  # intact, per-trade risk ramps along a graduated curve between these bounds --
  # still multiplied by the convex drawdown taper, so it can never breach the gate.
  catchup_risk_mult: 1.25            # baseline catch-up bump (behind, endgame)
  catchup_max_risk_mult: 1.5         # ceiling when deeply behind, very late, full budget
  endgame_escalate_dd_budget_min: 0.5  # only escalate past baseline with >= this DD budget left

# ---------------------------------------------------------------------------
# RISK — deterministic Sentinel limits. Enforced in code, never by the LLM.
# ---------------------------------------------------------------------------
risk:
  target_portfolio_vol_annual: 0.45  # vol-targeting: scale book to constant annualized vol
  max_gross_exposure: 0.90           # max fraction of equity deployed (remainder sits in stable)
  max_position_pct: 0.20             # hard cap per single position
  max_open_positions: 5
  daily_loss_limit_pct: 8.0          # pause NEW entries once daily loss exceeds this
  per_trade_risk_pct: 1.5            # capital risked per trade (stop-distance sized)
  stop_loss_atr_mult: 2.5
  take_profit_atr_mult: 4.0
  trailing_stop: true
  slippage_bps_max: 150              # reject a fill if quoted slippage exceeds this
  min_liquidity_usd: 250000          # skip tokens below this 24h volume (honeypot/illiquidity guard)
  fee_bps_roundtrip: 60              # simulated round-trip cost used by the edge gate
  gas_usd_per_swap: 0.30             # BSC network gas charged PER swap, modeled in paper AND live
                                     # (~150k gas x 1-3 gwei x BNB price). Conservative on purpose so
                                     # the simulator runs pessimistic vs live; the live adapter
                                     # overrides it with the real receipt gas when it can read one.
  gas_max_pct_of_notional: 0.015     # reject a swap whose gas exceeds this fraction of its notional
                                     # (gas-aware dust floor: min trade = gas / this, ~$20 at defaults).
  # --- Leader rotation: recycle dead capital into the engine's current #1 ----
  # Momentum decays. A name bought days ago can fall out of the ranked shortlist
  # while still hogging the book, starving the live leader of capital. Rotation
  # sells that dead weight into the leader so capital always follows conviction.
  # Hysteresis (edge + min-hold + min size + one/cycle) stops it thrashing.
  rotation_enabled: true
  rotation_min_edge: 0.40            # leader composite must beat the stale name by >= this (z-score pts)
  rotation_min_hold_hours: 4.0       # never rotate a position younger than this (anti-whipsaw)
  rotation_cash_floor_usd: 15.0      # fire when deployable cash drops below this (capital-constrained)
  rotation_big_holding_frac: 0.45    # ...OR when a stale holding is >= this fraction of equity (regime change)
  rotation_min_stale_usd: 10.0       # never rotate a holding smaller than this (gas would dominate)
  rotation_topup_frac: 0.85          # treat the leader as underfunded if held below this x its max weight

# ---------------------------------------------------------------------------
# SIGNALS — cross-sectional momentum / relative strength + vol.
# ---------------------------------------------------------------------------
signals:
  lookbacks_hours: [6, 24, 72, 168]      # multi-horizon momentum
  momentum_weights: [0.15, 0.35, 0.30, 0.20]
  min_composite_score: 0.15              # conviction floor — only act above this
  net_of_cost_gate: true                 # only size when expected edge clears round-trip cost
  rebalance_interval_min: 60             # decision cadence (minutes)
  top_n: 3                               # hold the top-N ranked eligible names

# ---------------------------------------------------------------------------
# REGIME — global risk throttle (the survival valve).
# ---------------------------------------------------------------------------
regime:
  fear_greed_risk_off: 25                # <= -> defensive (cut gross, prefer stable)
  fear_greed_risk_on: 78                 # >= -> euphoric, fade / trim aggression
  btc_dominance_trend_lookback_h: 72
  use_derivatives_funding: true          # funding/OI from CMC derivatives metrics
  risk_off_gross_scale: 0.35             # multiply gross exposure by this when risk-off
  # Survival-gated overlay: with full drawdown budget only this fraction of the
  # regime de-risking cut applies (stay deployed through fear spikes instead of
  # de-risking into a V-recovery); as budget thins the cut ramps to full strength.
  # Validated in backtest/regime_ab.py -- gated overlay is >= neutral in every
  # regime tested (bull/chop/bear) and best-in-class in chop. 1.0 disables the gate.
  overlay_dd_gate_floor: 0.35

# ---------------------------------------------------------------------------
# DATA — provider priority with honest fallback chain.
# ---------------------------------------------------------------------------
data:
  provider_priority: [twak_x402, cmc_mcp, cmc_rest, public]
  cache_ttl_sec: 45
  candles_source: public                 # public klines for OHLCV history (labeled in UI)

# ---------------------------------------------------------------------------
# UNIVERSE — eligible set is fixed (149 BEP-20). We TRADE a curated liquid
# subset by default (survival-first on small capital; avoids dust/honeypots).
# ---------------------------------------------------------------------------
universe:
  use_curated_tradeable: true            # trade liquid majors subset, not all 149
  extra_tradeable: []                    # add eligible symbols to widen the book
  exclude: [ETC, PENDLE, COMP, SUSHI, APE, SNX, FET, LDO]   # no verified deep-liquidity USDT route on BSC -> keep engine from ranking an unbuyable #1

execution:
  adapter: paper                         # paper | twak
  dex: pancakeswap
  chain_id: 56
  x402_on_buys: true                     # pay ~$0.01 for fresh DEX data before each buy
  quote_only_dry_run: true               # in dry-run, request live quotes but never broadcast
  bsc_rpc_urls: []                        # redundant BSC RPC failover; empty = built-in public defaults
  wallet_address: "0x2d8d17a72c8462AdbF1538Bfe03F5f2AaACb471A"  # TWAK trading wallet (holds funds); live reconcile + scoring read this. Override with HELM_WALLET_ADDRESS.
  # SYM -> canonical Binance-Peg BEP-20 address. Each VERIFIED on-chain via
  # symbol()/decimals() 2026-06-25 before live use. Without these the executor
  # cannot swap (or SELL a held name) -> idle cash can't deploy + a stop can't
  # exit. DOGE is 8-decimals (handled in twak.py); all others 18.
  token_addresses:
    ETH:  "0x2170Ed0880ac9A755fd29B2688956BD959F933F8"
    CAKE: "0x0E09FaBB73Bd3Ade0a17ECC321fD13a19e81cE82"
    AAVE: "0xfb6115445Bff7b52FeB98650C87f44907E58f802"
    AVAX: "0x1CE0c2827e2eF14D5C4f29a091d735A204794041"
    UNI:  "0xBf5140A22578168FD562DCcF235E5D43A02ce9B1"
    LINK: "0xF8A0BF9cF54Bb92F17374d9e9A321E6a111a51bD"
    DOT:  "0x7083609fCE4d1d8Dc0C979AAb8c869Ea2C873402"
    XRP:  "0x1D2F0da169ceB9fC7B3144628dB156f3F6c60dBE"
    ADA:  "0x3EE2200Efb3400fAbB9AacF31297cBdD1d435D47"
    LTC:  "0x4338665CBB7B2485A8855A139b75D5e34AB0DB94"
    BCH:  "0x8fF795a6F4D97E7887C79beA79aba5cc76444aDf"
    ATOM: "0x0Eb3a705fc54725037CC9e008bDede697f62F335"
    DOGE: "0xbA2aE424d960c26247Dd6c32edC70B295c744C43"
    FIL:  "0x0D8Ce2A99Bb6e3B7Db580eD848240e4a0F9aE153"
    INJ:  "0xa2B726B1145A4773F68593CF171187d8EBe4d495"
    TWT:  "0x4B0F1812e5Df2A09796481Ff14017e6005508003"

scoring:
  # Competition scoring assumptions HELM encodes. CONFIRM against the official
  # BNB Hack rules, then set confirmed: true (preflight warns until you do).
  min_hold_usd_per_hour: 1.0             # an hour holding < this in eligible value scores 0%
  must_hold_in_scope: true               # only eligible-set holdings count; never park out of scope
  mark_from_onchain: true                # live: mark equity from real on-chain balances (score-truthful)
  onchain_drift_alert_pct: 2.0           # ledger-alert when booked vs on-chain holdings drift past this
  rules_url: ""                          # link to official rules (for the record)
  confirmed: false                       # flip true once verified against the official spec

identity:
  register_erc8004: false                # set true to register on-chain agent identity
  network: bsc-testnet

dashboard:
  host: 127.0.0.1
  port: 8600

# ===========================================================================
# PROFILES — named overrides layered onto the blocks above at load time.
# The base config (above) IS the `balanced` profile. `aggressive` retunes the
# risk/regime knobs for a one-week, return-ranked, bust-out-constrained sprint:
# stay deployed through fear, concentrate in the top momentum names, and let the
# 30% DQ gate (not an over-cautious 22%) be the binding constraint. Every
# deterministic guardrail (kill-switch, Sentinel pre-trade checks, hash-chained
# ledger, convex drawdown taper, DQ halt) stays fully enforced in BOTH profiles —
# only the dials move. Select with `profile:` above or HELM_PROFILE=aggressive.
# ===========================================================================
profiles:

  # Capital-preservation posture. Empty = use the survival-first base as-is.
  balanced: {}

  # Contest posture: maximize expected total return inside the DQ constraint.
  aggressive:
    contest:
      halt_drawdown_pct: 26.0        # use the DQ runway; keep a 4-pt margin to 30
      protect_lead_return_pct: 28.0  # don't turn defensive early in a 1-week sprint
      catchup_behind_return_pct: 4.0 # widen the catch-up trigger band
    risk:
      target_portfolio_vol_annual: 0.85   # a return race rewards vol, not suppresses it
      max_gross_exposure: 0.97            # near-fully deployed
      max_position_pct: 0.33              # 3 names ≈ 99% — genuine concentration
      daily_loss_limit_pct: 14.0          # don't freeze on a normal red day mid-sprint
      per_trade_risk_pct: 3.0             # double the conviction per entry
      take_profit_atr_mult: 6.0           # let winners run further before trimming
    signals:
      min_composite_score: 0.10           # act on slightly thinner edge to stay invested
      top_n: 3                            # concentrated, but diversified enough to survive
    regime:
      risk_off_gross_scale: 0.62          # stay ~60%+ deployed even in fear (vs 35%)
      overlay_dd_gate_floor: 0.30         # lean deployed through fear (gate cuts less while budget healthy)

  # Endgame catch-up posture: hottest dial, ~2-pt DQ margin. Deliberate use only —
  # the meta-controller's convex drawdown taper still cuts exposure before the gate.
  #
  # *** THIS IS THE CONTEST PROFILE (set HELM_PROFILE=max for the live week). ***
  # Retuned 2026-06-20 across 88 windows x 4 regime anchors (current / Nov-24 bull /
  # Aug-24 crash / Feb-25 selloff), 7-day contest clock, true 30% DQ gate:
  # Pareto-dominant for the return-ranked, winner-take-all prize. Single-name
  # concentration (top_n=1) TRIPLES the rate of tournament-winning (>=15%) weeks
  # vs the prior top_n=2 book (2% -> 7%) and lifts the ceiling +24% -> +32%, while
  # *lowering* realized drawdown (16.9% vs 17.8%) and improving the worst week.
  # Mechanism (not overfit): vol-targeting equalizes each name's risk budget, so
  # the #1 relative-strength leader is the highest-conviction bet; a 2nd name just
  # dilutes toward the mean and doubles churn/gas. Same effect we already saw 3->2.
  # The 20% cash buffer (max_position_pct 0.80) is near-free DQ insurance: it costs
  # ~2pt at the p95 tail but raises the single-name gap-to-DQ threshold from a 31%
  # to a 37.5% instant move — roughly halving the one risk the backtest can't see
  # (a hack/depeg on the held name). Cranking target_vol is a DEAD lever here
  # (1.2 == 1.6 identical; max_position_pct binds first). Single-name risk further
  # bounded: curated book is liquid majors only (no rug-prone micro-caps) and
  # Sentinel pre-trade checks run on every live entry; the daily-floor still fires.
  max:
    contest:
      halt_drawdown_pct: 28.0
      protect_lead_return_pct: 35.0
      catchup_behind_return_pct: 6.0
      endgame_escalate_dd_budget_min: 0.4  # escalate with a touch less budget in last-resort mode
    risk:
      target_portfolio_vol_annual: 1.20
      # Endgame full-deployment: >1.0 intentionally targets ~100% deployed so idle
      # cash is put to work in the #1 leader instead of sitting out the final push.
      # This is NOT leverage (spot only) and the agent never orders past actual
      # USDT (cash cap in _run_entries). The convex SURVIVAL drawdown taper still
      # collapses gross as we approach the halt line, so the 30% DQ gate is intact.
      max_gross_exposure: 1.40
      max_position_pct: 0.80              # per-name cap keeps a single-name gap-to-DQ cushion
      daily_loss_limit_pct: 20.0
      per_trade_risk_pct: 5.0
      take_profit_atr_mult: 8.0
    signals:
      min_composite_score: 0.06
      top_n: 1                            # hold only the #1 relative-strength leader (fattest right tail)
    regime:
      risk_off_gross_scale: 0.99          # stay fully deployed through fear in the endgame (was 0.80)
      overlay_dd_gate_floor: 0.10         # apply little of the risk-off cut while DD budget is healthy

