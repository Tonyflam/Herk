  port: 8600

# ===========================================================================
# PROFILES — named overrides layered onto the blocks above at load time.
# The base config (above) IS the `balanced` profile. `aggressive` retunes the
# risk/regime knobs for a one-week, return-ranked, bust-out-constrained sprint:
# stay deployed through fear, concentrate in the top momentum names, and let the
# 30% DQ gate (not an over-cautious 22%) be the binding constraint. Every
# deterministic guardrail (kill-switch, Sentinel pre-trade checks, hash-chained
# ledger, convex drawdown taper, DQ halt) stays fully enforced in BOTH profiles —
# only the dials move. Select with `profile:` above or HELM_PROFILE=aggressive.
# ===========================================================================
profiles:

  # Capital-preservation posture. Empty = use the survival-first base as-is.
  balanced: {}

  # Contest posture: maximize expected total return inside the DQ constraint.
  aggressive:
    contest:
      halt_drawdown_pct: 26.0        # use the DQ runway; keep a 4-pt margin to 30
      protect_lead_return_pct: 28.0  # don't turn defensive early in a 1-week sprint
      catchup_behind_return_pct: 4.0 # widen the catch-up trigger band
    risk:
      target_portfolio_vol_annual: 0.85   # a return race rewards vol, not suppresses it
      max_gross_exposure: 0.97            # near-fully deployed
      max_position_pct: 0.33              # 3 names ≈ 99% — genuine concentration
      daily_loss_limit_pct: 14.0          # don't freeze on a normal red day mid-sprint
      per_trade_risk_pct: 3.0             # double the conviction per entry
      take_profit_atr_mult: 6.0           # let winners run further before trimming
    signals:
      min_composite_score: 0.10           # act on slightly thinner edge to stay invested
      top_n: 3                            # concentrated, but diversified enough to survive
    regime:
      risk_off_gross_scale: 0.62          # stay ~60%+ deployed even in fear (vs 35%)
      overlay_dd_gate_floor: 0.30         # lean deployed through fear (gate cuts less while budget healthy)

  # Endgame catch-up posture: hottest dial, ~2-pt DQ margin. Deliberate use only —
  # the meta-controller's convex drawdown taper still cuts exposure before the gate.
  #
  # *** THIS IS THE CONTEST PROFILE (set HELM_PROFILE=max for the live week). ***
  # Retuned 2026-06-20 across 88 windows x 4 regime anchors (current / Nov-24 bull /
  # Aug-24 crash / Feb-25 selloff), 7-day contest clock, true 30% DQ gate:
  # Pareto-dominant for the return-ranked, winner-take-all prize. Single-name
  # concentration (top_n=1) TRIPLES the rate of tournament-winning (>=15%) weeks
  # vs the prior top_n=2 book (2% -> 7%) and lifts the ceiling +24% -> +32%, while
  # *lowering* realized drawdown (16.9% vs 17.8%) and improving the worst week.
  # Mechanism (not overfit): vol-targeting equalizes each name's risk budget, so
  # the #1 relative-strength leader is the highest-conviction bet; a 2nd name just
  # dilutes toward the mean and doubles churn/gas. Same effect we already saw 3->2.
  # The 20% cash buffer (max_position_pct 0.80) is near-free DQ insurance: it costs
  # ~2pt at the p95 tail but raises the single-name gap-to-DQ threshold from a 31%
  # to a 37.5% instant move — roughly halving the one risk the backtest can't see
  # (a hack/depeg on the held name). Cranking target_vol is a DEAD lever here
  # (1.2 == 1.6 identical; max_position_pct binds first). Single-name risk further
  # bounded: curated book is liquid majors only (no rug-prone micro-caps) and
  # Sentinel pre-trade checks run on every live entry; the daily-floor still fires.
  max:
    contest:
      halt_drawdown_pct: 28.0
      protect_lead_return_pct: 35.0
      catchup_behind_return_pct: 6.0
      endgame_escalate_dd_budget_min: 0.4  # escalate with a touch less budget in last-resort mode
    risk:
      target_portfolio_vol_annual: 1.20
      # Endgame full-deployment: >1.0 intentionally targets ~100% deployed so idle
      # cash is put to work in the #1 leader instead of sitting out the final push.
      # This is NOT leverage (spot only) and the agent never orders past actual
      # USDT (cash cap in _run_entries). The convex SURVIVAL drawdown taper still
      # collapses gross as we approach the halt line, so the 30% DQ gate is intact.
      max_gross_exposure: 1.40
      max_position_pct: 0.80              # per-name cap keeps a single-name gap-to-DQ cushion
      daily_loss_limit_pct: 20.0
      per_trade_risk_pct: 5.0
      take_profit_atr_mult: 8.0
      # Gas-aware dust floor, relaxed for the endgame. The floor is
      # gas_usd_per_swap / gas_max_pct_of_notional = 0.30/0.015 = $20 by default.
      # The volatility tilt selects high-ATR names, and a high-ATR name gets a
      # WIDE risk-stop, so its risk-sized entry under the conservative build
      # posture can land ~$12 — below a $20 floor, leaving the agent unable to
      # BUY the very mover it ranks at the top. Raising the cap to 3% drops the
      # floor to 0.30/0.03 = $10 so those entries clear (a one-time ~2.5-3% gas
      # cost on a position we intend to HOLD for the run, not churn). Still
      # rejects truly uneconomic sub-$10 micro-trades. (Gas-token adoption is
      # prevented in agent._reconcile_onchain, never by this floor.)
      gas_max_pct_of_notional: 0.03
      # Self-diversification: let the agent trim an over-concentrated holding's
      # EXCESS (above an equal-weight target) to seed a higher-ranked leader it
      # holds none of, when it has no spare cash. This is what frees it from a
      # 100%-one-name corner on its own -- e.g. trimming AAVE to establish INJ --
      # without any operator nudge. Only the surplus is ever sold (the harvester
      # keeps its core); every rotation guardrail still applies.
      rotation_rebalance_enabled: true
      # Manual swing lever, live-armed: lets the operator take profit on the
      # leader on command and auto-rebuy the dip. Idle until HELM_SWING_CMD is
      # set; all guardrails stay in force.
      swing_enabled: true
      swing_symbol: "AAVE"
      swing_rebuy_drop: 0.02
      # Autonomous volatility harvester -- the proven "profit guard" the leaders
      # run: bank a slice of the position into USDT on every rip, buy a slice with
      # idle cash on every dip, always keep a decaying core + cash reserve. Turns
      # a static long into an oscillation harvester so AAVE's chop becomes locked
      # realized gains instead of being round-tripped. Live-tunable without a
      # redeploy: HELM_HARVEST_STEP (band) / HELM_HARVEST_FRAC (slice size).
      harvest_enabled: true
      harvest_step_pct: 0.035
      harvest_trade_frac: 0.20
      harvest_min_trade_usd: 4.0
      harvest_trail_giveback_pct: 0.03   # scale a slice out on a 3% give-back from a fresh peak
      # Autopilot: autonomous momentum risk-on/off. Steps the WHOLE book to cash
      # when the leader's fast (few-hour) momentum rolls over past exit_mom, and
      # buys back into the leader once it turns up past entry_mom. The gap between
      # the two is a dead-band so a steady trend is ridden, not churned. This is
      # the "knows when to close and when to buy" brain -- it reacts intraday,
      # faster than the multi-horizon composite or the ~8% trailing stop. Every
      # guardrail still applies; live-tunable via HELM_AUTOPILOT / HELM_AP_EXIT /
      # HELM_AP_ENTRY without a redeploy.
      autopilot_enabled: true
      autopilot_exit_mom: -0.015         # flat to cash when leader fast-mom <= -1.5%
      autopilot_entry_mom: 0.015         # buy back when leader fast-mom >= +1.5%
    signals:
      min_composite_score: 0.06
      autopilot_fast_hours: 3            # fast-momentum window (1h closes) the autopilot reads
      top_n: 1                            # FINAL-SPRINT MAX CONCENTRATION (2026-06-27): the #1
                                          # competitor is no longer frozen in cash — it is a LIVE
                                          # mover (~100% in a pumping token, +10% and climbing). A
                                          # diversified 2-name book cannot out-run a single climbing
                                          # leader; only a max-conviction bet on the strongest
                                          # relative-strength name can. This profile's own
                                          # walk-forward backtest is unambiguous: top_n=1 TRIPLES the
                                          # tournament-winning (>=15%) rate (2%->7%) and lifts the
                                          # ceiling +24%->+32% vs top_n=2. We concentrate the whole
                                          # book into the engine's #1 ranked mover for the last ~30h.
                                          # DQ guardrails stay intact: max_position_pct 0.80 keeps a
                                          # 20% cash buffer, the convex survival taper collapses gross
                                          # before the 30% gate, and Sentinel pre-trade checks every
                                          # entry. The harvester banks this single name's rips to USDT
                                          # so realized gains can never round-trip away.
      vol_tilt_weight: 0.7                # grid-fuel tilt: our harvester IS a grid (earns from
                                          # price RANGE), yet vol-adjusted momentum penalises the
                                          # very volatility that fuels it. Add z(atr%)×0.7 to the
                                          # composite so the most volatile ROUTABLE liquid name
                                          # (INJ, atr ~2.5% vs AAVE ~2.4%) ranks alongside AAVE —
                                          # a volatility-FIRST selection (the proven edge of the
                                          # leader's grid) but constrained to names with a real
                                          # PancakeSwap route. The rebalance then seeds a
                                          # diversified ~50/50 AAVE+INJ book (capped at
                                          # equity/top_n, never all-in) where both the harvester
                                          # and the directional upside live.
    universe:
      # Endgame (2026-06-27): scan the FULL eligible universe, not just the
      # curated majors, so the agent can rotate into ANY eligible token that is
      # both (a) routable — has a verified address in execution.token_addresses —
      # and (b) the strongest momentum name. The routability + liquidity + quality
      # filters in agent.step()/engine keep it from touching junk or unsellable
      # names. NOTE: the earlier "XPL is a honeypot" call was a honeypot.is FALSE
      # POSITIVE — the same tool flags AAVE/INJ (which we trade live) as honeypots.
      # XPL was re-verified SELLABLE on DexScreener (23.8k real sells/24h, $0.45M
      # V3 liquidity) and is now in the registry above.
      use_curated_tradeable: false
      extra_tradeable: []
    regime:
      risk_off_gross_scale: 0.99          # stay fully deployed through fear in the endgame (was 0.80)
      overlay_dd_gate_floor: 0.10         # apply little of the risk-off cut while DD budget is healthy

